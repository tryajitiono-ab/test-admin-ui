name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b

      - name: Build 1st variant (gameconfigs)
        env:
          OUT_DIR: dist/gameconfigs
          BASE_PATH: /${{ github.event.repository.name }}/gameconfigs/
          BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/gameconfigs
          VITE_CONFIG_KEY: gameconfigs
          VITE_INSTANCE_LABEL: 1st
        run: npx vite build

      - name: Build 2nd variant (gameconfigs2nd)
        env:
          OUT_DIR: dist/gameconfigs2nd
          BASE_PATH: /${{ github.event.repository.name }}/gameconfigs2nd/
          BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/gameconfigs2nd
          VITE_CONFIG_KEY: gameconfigs2nd
          VITE_INSTANCE_LABEL: 2nd
        run: npx vite build

      - name: Build 3rd variant (gameconfigs3rd)
        env:
          OUT_DIR: dist/gameconfigs3rd
          BASE_PATH: /${{ github.event.repository.name }}/gameconfigs3rd/
          BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/gameconfigs3rd
          VITE_CONFIG_KEY: gameconfigs3rd
          VITE_INSTANCE_LABEL: 3rd
        run: npx vite build

      - name: Build 4th variant (gameconfigs4th)
        env:
          OUT_DIR: dist/gameconfigs4th
          BASE_PATH: /${{ github.event.repository.name }}/gameconfigs4th/
          BASE_URL: /${{ github.event.repository.name }}/gameconfigs4th
          VITE_CONFIG_KEY: gameconfigs4th
          VITE_INSTANCE_LABEL: 4th
        run: npx vite build

      - name: Build tournament-system variant
        env:
          OUT_DIR: dist/tournament-system
          BASE_PATH: /${{ github.event.repository.name }}/tournament-system/
          BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/tournament-system
          VITE_APP_NAME: tournament-system
        run: npx vite build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
